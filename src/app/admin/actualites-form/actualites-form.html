<div class="max-w-3xl mx-auto py-12 px-4">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-green-700">Ajouter une Actualité</h1>
    </div>

    <div *ngIf="success()" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
      {{ success() }}
    </div>

    <div *ngIf="error()" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
      {{ error() }}
    </div>

    <form [formGroup]="form" (submit)="onSubmit(); $event.preventDefault()" class="space-y-6">

      <!-- Titre -->
      <div>
        <label class="block font-medium mb-2">Titre *</label>
        <input type="text" formControlName="title" class="w-full border rounded-lg px-4 py-3">
      </div>

      <!-- Contenu -->
      <div>
        <label class="block font-medium mb-2">Contenu</label>
        <textarea rows="6" formControlName="content" class="w-full border rounded-lg px-4 py-3"></textarea>
      </div>

      <!-- Thumbnail upload -->
      <div>
        <label class="block font-medium mb-2">Thumbnail *</label>
        <input 
          type="file" 
          (change)="onFileSelected($event)" 
          accept="image/*"
          class="w-full border rounded-lg px-4 py-3"
        >
      </div>

      <!-- Lien -->
      <div>
        <label class="block font-medium mb-2">Lien externe (optionnel)</label>
        <input type="text" formControlName="link" placeholder="https://..." class="w-full border rounded-lg px-4 py-3">
      </div>

      <!-- Submit -->
      <button 
        type="submit" 
        [disabled]="loading()" 
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-4 rounded-xl"
      >
        {{ loading() ? 'Enregistrement...' : 'Publier l’Actualité' }}
      </button>

    </form>
  </div>
</div>
