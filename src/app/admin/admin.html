<div class="min-h-screen flex bg-gray-100">
  <!-- SIDEBAR -->
  <aside class="w-72 bg-white shadow-xl border-r border-gray-200 flex flex-col">
    <div class="p-6 border-b">
      <h1 class="text-2xl font-bold text-green-700">CSU Admin</h1>
      <p class="text-sm text-gray-500">Panneau de gestion</p>
      
      <!-- Info utilisateur connecté -->
      <div *ngIf="currentUser" class="mt-4 p-3 bg-green-50 rounded-xl text-sm">
        <p class="font-medium text-green-800">{{ currentUser.fullname }}</p>
        <p class="text-green-600 text-xs">{{ currentUser.email }}</p>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-6">
      <div *ngFor="let group of visibleMenu">
        <p class="text-xs font-bold text-gray-500 uppercase mb-2">{{ group.title }}</p>
        <a
          *ngFor="let item of group.items"
          [routerLink]="item.route"
          routerLinkActive="bg-green-50 text-green-700"
          class="btn-admin"
        >
          {{ item.icon }} {{ item.label }}
        </a>
      </div>
    </nav>

    <!-- Bouton Déconnexion -->
    <button (click)="logout()" 
            class="p-4 bg-red-600 hover:bg-red-700 text-white text-center font-semibold transition">
      Déconnexion
    </button>
  </aside>

  <!-- CONTENU PRINCIPAL -->
  <main class="flex-1 p-8 overflow-y-auto bg-gray-50 rounded-l-lg">
    <router-outlet></router-outlet>
  </main>
</div>
