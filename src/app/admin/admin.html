<div class="min-h-screen flex gap-6 bg-gray-100 p-6">
  <!-- SIDEBAR -->
  <aside class="w-72 flex flex-col bg-green-600 text-white shadow-2xl rounded-3xl overflow-hidden self-start sticky top-6">

    <!-- En-tête -->
    <div class="p-6 border-b border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl bg-white/15 backdrop-blur flex items-center justify-center text-2xl shadow-inner">
          🛡️
        </div>
        <div>
          <h1 class="text-xl font-bold leading-tight tracking-tight">CSU Admin</h1>
          <p class="text-xs text-green-200">Panneau de gestion</p>
        </div>
      </div>

      <!-- Info utilisateur connecté -->
      <div *ngIf="currentUser"
           class="mt-5 p-3 rounded-2xl bg-white/10 backdrop-blur border border-white/10 flex items-center gap-3">
        <div class="w-9 h-9 rounded-full bg-white text-green-800 font-bold flex items-center justify-center uppercase shrink-0">
          {{ (currentUser.fullname || '?').charAt(0) }}
        </div>
        <div class="min-w-0">
          <p class="font-semibold text-sm text-white truncate">{{ currentUser.fullname }}</p>
          <p class="text-green-200 text-xs truncate">{{ currentUser.email }}</p>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-6 overflow-y-auto">
      <div *ngFor="let group of visibleMenu">
        <p class="px-2 text-[11px] font-bold text-green-300/80 uppercase tracking-wider mb-2">
          {{ group.title }}
        </p>
        <a
          *ngFor="let item of group.items"
          [routerLink]="item.route"
          routerLinkActive="bg-white text-green-800 shadow-md font-semibold"
          class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-green-50 hover:bg-white/10 transition mb-1"
        >
          <span class="text-base">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      </div>
    </nav>

    <!-- Bouton Déconnexion -->
    <div class="p-4 border-t border-white/10">
      <button (click)="logout()"
              class="group w-full flex items-center justify-center gap-2 px-4 py-3 rounded-2xl
                     bg-white/10 hover:bg-red-500 border border-white/20 hover:border-red-500
                     text-white font-semibold transition-all duration-200">
        <span class="text-lg group-hover:-translate-x-0.5 transition-transform">⏻</span>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- CONTENU PRINCIPAL -->
  <main class="flex-1 p-8 overflow-y-auto bg-gray-100">
    <router-outlet></router-outlet>
  </main>
</div>
