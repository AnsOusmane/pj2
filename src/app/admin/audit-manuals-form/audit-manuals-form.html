<div class="max-w-3xl mx-auto py-12 px-4">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-green-700">
        Ajouter un Manuel d'Audit
      </h1>
      <p class="text-gray-600 mt-3">
        Ajoutez un manuel ou guide d’audit interne.
      </p>
    </div>

    <div *ngIf="success()" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
      {{ success() }}
    </div>
    <div *ngIf="error()" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
      {{ error() }}
    </div>

    <form [formGroup]="form" (submit)="onSubmit(); $event.preventDefault()" class="space-y-6">

      <div>
        <label class="block font-medium mb-2">Titre du Manuel *</label>
        <input type="text" formControlName="title" 
               placeholder="Ex: Manuel d'Audit Interne - Édition 2026"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
               [class.border-red-500]="isInvalid('title')">
        <p *ngIf="isInvalid('title')" class="text-red-600 text-sm mt-1">Le titre est obligatoire.</p>
      </div>

      <div>
        <label class="block font-medium mb-2">Description</label>
        <textarea rows="4" formControlName="description"
                  placeholder="Résumé du manuel d'audit..." 
                  class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
      </div>

      <div>
        <label class="block font-medium mb-2">Fichier PDF *</label>
        <input id="file" type="file" accept=".pdf" (change)="onPdfChange($event)"
               class="w-full border rounded-lg px-4 py-3 bg-gray-50">
        <p *ngIf="selectedPdf()" class="text-sm text-green-700 mt-2">PDF sélectionné : {{ selectedPdf() }}</p>
      </div>

      <div>
        <label class="block font-medium mb-2">Image de couverture (optionnel)</label>
        <input id="cover" type="file" accept=".jpg,.jpeg,.png,.webp" (change)="onCoverChange($event)"
               class="w-full border rounded-lg px-4 py-3 bg-gray-50">
        <p *ngIf="selectedCover()" class="text-sm text-blue-700 mt-2">Image sélectionnée : {{ selectedCover() }}</p>
      </div>

      <button type="submit" [disabled]="loading()" 
              class="w-full bg-green-600 hover:bg-green-700 disabled:opacity-60 text-white font-semibold py-3 rounded-xl transition">
        {{ loading() ? 'Enregistrement...' : 'Publier le Manuel d\'Audit' }}
      </button>
    </form>
  </div>
</div>
