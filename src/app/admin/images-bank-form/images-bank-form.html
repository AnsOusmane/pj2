<div class="max-w-3xl mx-auto py-12 px-4">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <div class="admin-form-head">
      <h1 class="text-3xl font-bold text-green-700">Ajouter une Image</h1>
    </div>

    <div *ngIf="success()" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
      {{ success() }}
    </div>
    <div *ngIf="error()" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
      {{ error() }}
    </div>

    <form [formGroup]="form" (submit)="onSubmit(); $event.preventDefault()" class="space-y-6">
      <div>
        <label class="block font-medium mb-2">Titre *</label>
        <input type="text" formControlName="title" class="w-full border rounded-lg px-4 py-3" [class.border-red-500]="isInvalid('title')">
      </div>

      <div>
        <label class="block font-medium mb-2">Catégorie</label>
        <input type="text" formControlName="category" placeholder="Ex: Événements, Infrastructures..." class="w-full border rounded-lg px-4 py-3">
      </div>

      <div>
        <label class="block font-medium mb-2">Image *</label>
        <input id="image" type="file" accept="image/*" (change)="onImageChange($event)" class="w-full border rounded-lg px-4 py-3 bg-gray-50">
        <p *ngIf="selectedImage()" class="text-sm text-green-700 mt-2">Sélectionné : {{ selectedImage() }}</p>
      </div>

      <button type="submit" [disabled]="loading()" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl">
        {{ loading() ? 'Enregistrement...' : 'Ajouter l\'image' }}
      </button>
    </form>
  </div>
</div>
