<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">
      
      <!-- Logo / Header -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-2xl mb-4">
          <span class="text-3xl">🏥</span>
        </div>
        <h1 class="text-3xl font-bold text-green-700">CSU Admin</h1>
        <p class="text-gray-600 mt-2">Connectez-vous à votre espace administration</p>
      </div>

      <!-- Success Message -->
      <div *ngIf="success()" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-center">
        {{ success() }}
      </div>

      <!-- Error Message -->
      <div *ngIf="error()" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-center">
        {{ error() }}
      </div>

      <form [formGroup]="form" (submit)="onSubmit(); $event.preventDefault()" class="space-y-6">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" formControlName="email"
                 placeholder="admin@csu.sn"
                 class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
                 [class.border-red-500]="isInvalid('email')">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
          <div class="relative">
            <input 
              [type]="showPassword() ? 'text' : 'password'" 
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition"
              [class.border-red-500]="isInvalid('password')">
            
            <button type="button" 
                    (click)="togglePassword()"
                    class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
              {{ showPassword() ? '🙈' : '👁️' }}
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                [disabled]="loading()"
                class="w-full bg-green-600 hover:bg-green-700 disabled:bg-green-400 text-white font-semibold py-3.5 rounded-2xl transition text-lg shadow-md">
          {{ loading() ? 'Connexion en cours...' : 'Se Connecter' }}
        </button>

      </form>

      <!-- Footer Info -->
      <div class="text-center mt-6 text-xs text-gray-500">
        Mot de passe oublié ? Contactez l'administrateur principal
      </div>

    </div>

  </div>
</div>
