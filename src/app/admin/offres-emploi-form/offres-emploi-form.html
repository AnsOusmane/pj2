<div class="max-w-3xl mx-auto py-12 px-4">
  <div class="bg-white rounded-2xl shadow-xl p-8">

    <!-- HEADER -->
    <div class="admin-form-head">
      <h1 class="text-3xl font-bold text-green-700">
        Nouvelle Offre d'Emploi
      </h1>
      <p class="text-gray-600 mt-3">
        Publiez une offre d'emploi avec le fichier PDF et une image de couverture.
      </p>
    </div>

    <!-- SUCCESS -->
    <div *ngIf="success()" 
         class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
      {{ success() }}
    </div>

    <!-- ERROR -->
    <div *ngIf="error()" 
         class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
      {{ error() }}
    </div>

    <form [formGroup]="form" 
          (submit)="onSubmit(); $event.preventDefault()" 
          class="space-y-6">

      <!-- Titre de l'offre -->
      <div>
        <label class="block font-medium mb-2">Titre de l'offre *</label>
        <input type="text" formControlName="title"
               placeholder="Ex: Infirmier Diplômé - Service de Dialyse"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
               [class.border-red-500]="isInvalid('title')">
        <p *ngIf="isInvalid('title')" class="text-red-600 text-sm mt-1">
          Le titre est obligatoire.
        </p>
      </div>

      <!-- Société / Structure -->
      <div>
        <label class="block font-medium mb-2">Structure / Employeur *</label>
        <input type="text" formControlName="company"
               placeholder="Ex: Centre de Santé Urbain de Dakar"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"
               [class.border-red-500]="isInvalid('company')">
      </div>

      <!-- Lieu -->
      <div>
        <label class="block font-medium mb-2">Lieu</label>
        <input type="text" formControlName="location"
               placeholder="Ex: Dakar, Thiès, Saint-Louis..."
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none">
      </div>

      <!-- Date limite -->
      <div>
        <label class="block font-medium mb-2">Date limite de dépôt</label>
        <input type="date" formControlName="deadline"
               class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none">
      </div>

      <!-- Description -->
      <div>
        <label class="block font-medium mb-2">Description / Détails du poste</label>
        <textarea rows="6" formControlName="description"
                  placeholder="Décrivez le poste, les qualifications requises, les avantages..."
                  class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none"></textarea>
      </div>

      <!-- Fichier PDF -->
      <div>
        <label class="block font-medium mb-2">Fichier PDF de l'offre *</label>
        <input id="file" type="file" accept=".pdf"
               (change)="onPdfChange($event)"
               class="w-full border rounded-lg px-4 py-3 bg-gray-50">
        <p *ngIf="selectedPdf()" class="text-sm text-green-700 mt-2">
          PDF sélectionné : {{ selectedPdf() }}
        </p>
      </div>

      <!-- Image de couverture -->
      <div>
        <label class="block font-medium mb-2">Image de couverture (optionnel)</label>
        <input id="cover" type="file" accept=".jpg,.jpeg,.png,.webp"
               (change)="onCoverChange($event)"
               class="w-full border rounded-lg px-4 py-3 bg-gray-50">
        <p *ngIf="selectedCover()" class="text-sm text-blue-700 mt-2">
          Image sélectionnée : {{ selectedCover() }}
        </p>
        <p class="text-xs text-gray-500 mt-1">
          Recommandé : format paysage ou carré (600x400 px)
        </p>
      </div>

      <!-- Bouton Publier -->
      <button type="submit"
              [disabled]="loading()"
              class="w-full bg-green-600 hover:bg-green-700 disabled:opacity-60 text-white font-semibold py-3.5 rounded-xl transition text-lg">
        {{ loading() ? 'Publication en cours...' : 'Publier l\'Offre d\'Emploi' }}
      </button>

    </form>
  </div>
</div>
