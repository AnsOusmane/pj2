<div class="min-h-screen bg-gray-50 py-10 px-4 flex justify-center">
  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl p-8">

    <!-- Header -->
    <div class="admin-form-head">
      <div class="w-16 h-16 mx-auto bg-blue-100 rounded-2xl flex items-center justify-center mb-4 text-3xl">
        ✏️
      </div>
      <h1 class="text-3xl font-bold text-gray-800">
        Modifier Utilisateur
      </h1>
      <p class="text-gray-500 mt-2">
        Mise à jour des informations de l'utilisateur
      </p>
    </div>

    <!-- Success -->
    <div *ngIf="success()" 
         class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-center">
      {{ success() }}
    </div>

    <!-- Error -->
    <div *ngIf="error()" 
         class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-center">
      {{ error() }}
    </div>

    <!-- Loader -->
    <div *ngIf="loading()" class="text-center py-12">
      <div class="animate-spin w-10 h-10 border-4 border-green-600 border-t-transparent rounded-full mx-auto"></div>
      <p class="mt-4 text-gray-600">Chargement des données...</p>
    </div>

    <form *ngIf="!loading()" 
          [formGroup]="form"
          (submit)="onSubmit(); $event.preventDefault()" 
          class="space-y-6">

      <!-- Nom complet -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Nom complet *
        </label>
        <input type="text" 
               formControlName="fullname"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
               [class.border-red-500]="isInvalid('fullname')">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Email *
        </label>
        <input type="email" 
               formControlName="email"
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none"
               [class.border-red-500]="isInvalid('email')">
      </div>

      <!-- Rôle -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Rôle
        </label>
        <select formControlName="role"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
          <option value="admin">Administrateur</option>
          <option value="user">Utilisateur</option>
          <option value="cellule-pm">Cellule passation des marchés</option>
        </select>
      </div>

      <!-- Statut actif -->
      <div class="flex items-center gap-3">
        <input type="checkbox" 
               formControlName="is_active"
               class="w-5 h-5 text-green-600 rounded focus:ring-green-500">
        <label class="text-sm font-medium text-gray-700 cursor-pointer">
          Compte actif (peut se connecter)
        </label>
      </div>

      <!-- Boutons -->
      <div class="flex gap-4 pt-6">
        <button type="button"
                (click)="cancel()"
                class="flex-1 py-3 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50 transition">
          Annuler
        </button>

        <button type="submit"
                [disabled]="isSubmitting()"
                class="flex-1 bg-green-600 hover:bg-green-700 disabled:bg-green-400 text-white font-semibold py-3 rounded-2xl transition">
          {{ isSubmitting() ? 'Enregistrement...' : 'Enregistrer les modifications' }}
        </button>
      </div>

    </form>
  </div>
</div>
