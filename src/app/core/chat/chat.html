<!-- Bulle flottante d'ouverture -->
<button
  *ngIf="!chat.isOpen()"
  (click)="chat.open()"
  aria-label="Ouvrir l'assistant de discussion"
  title="Assistant SEN-CSU"
  class="chat-bubble fixed bottom-6 left-6 z-40 flex items-center justify-center
         w-14 h-14 rounded-full
         bg-green-600/85 backdrop-blur-md text-white
         ring-1 ring-white/30 shadow-lg
         hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-green-400 transition-colors"
>
  <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none"
       viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round"
          d="M8 10h8M8 14h5M21 12a8 8 0 01-11.5 7.2L3 21l1.8-6.5A8 8 0 1121 12z" />
  </svg>
</button>

<!-- Fenêtre de chat -->
<div
  *ngIf="chat.isOpen()"
  class="chat-window fixed bottom-6 left-6 z-40 flex flex-col
         w-[calc(100vw-3rem)] sm:w-96 h-[70vh] sm:h-[520px] max-h-[80vh]
         bg-white/60 backdrop-blur-2xl rounded-2xl overflow-hidden
         border border-green-600/20 shadow-xl"
>
  <!-- En-tête -->
  <div class="flex items-center gap-3 px-4 py-3 shrink-0
              bg-green-600/10 border-b border-green-600/20 text-green-900">
    <span class="flex items-center justify-center w-9 h-9 rounded-full
                 bg-green-600/15 text-green-700 ring-1 ring-green-600/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8 10h8M8 14h5M21 12a8 8 0 01-11.5 7.2L3 21l1.8-6.5A8 8 0 1121 12z" />
      </svg>
    </span>
    <div class="min-w-0">
      <p class="font-semibold leading-tight truncate text-green-800">Assistant SEN-CSU</p>
      <p class="text-[11px] text-green-700/70 leading-tight">FR · Wolof · EN</p>
    </div>
    <button
      (click)="chat.close()"
      aria-label="Fermer l'assistant"
      class="ml-auto text-green-700/70 hover:text-green-900 text-2xl leading-none px-1"
    >
      &times;
    </button>
  </div>

  <!-- Sélecteur de langue -->
  <div class="flex items-center gap-1 px-3 py-2 shrink-0
              border-b border-green-600/15 bg-white/30">
    <span class="text-[11px] text-green-700/60 mr-1">Langue :</span>
    <button
      *ngFor="let l of langs"
      (click)="setLang(l.value)"
      class="text-xs px-2.5 py-0.5 rounded-full border transition-colors"
      [ngClass]="chat.langMode() === l.value
        ? 'bg-green-600 text-white border-green-600'
        : 'bg-green-50/60 text-green-700 border-green-600/25 hover:bg-green-100/70'"
    >
      {{ l.label }}
    </button>
  </div>

  <!-- Zone messages -->
  <div #scrollZone class="flex-1 overflow-y-auto px-3 py-3 space-y-3">
    <div *ngFor="let m of messages()" class="flex flex-col">
      <!-- Indicateur « en train d'écrire… » -->
      <div *ngIf="m.typing"
           class="self-start px-3 py-2.5 rounded-2xl rounded-bl-sm
                  bg-green-50/70 border border-green-600/20 backdrop-blur-sm">
        <span class="chat-typing"><span></span><span></span><span></span></span>
      </div>

      <!-- Message utilisateur (dégradé vert, comme le CTA des 3 boutons) -->
      <div
        *ngIf="!m.typing && m.from === 'user'"
        class="self-end max-w-[85%] px-3 py-2 rounded-2xl rounded-br-sm text-sm leading-relaxed whitespace-pre-line
               bg-gradient-to-r from-emerald-500 via-green-500 to-green-600 text-white ring-1 ring-white/20"
      >
        {{ m.text }}
      </div>

      <!-- Message du bot (vert translucide, bordure fine) -->
      <div
        *ngIf="!m.typing && m.from === 'bot'"
        class="self-start max-w-[85%] px-3 py-2 rounded-2xl rounded-bl-sm text-sm leading-relaxed whitespace-pre-line
               bg-green-50/70 border border-green-600/20 text-green-900 backdrop-blur-sm"
      >
        {{ m.text }}
      </div>

      <!-- Suggestions cliquables (messages du bot) -->
      <div *ngIf="m.suggestions?.length" class="flex flex-wrap gap-1.5 mt-2 self-start max-w-[95%]">
        <button
          *ngFor="let s of m.suggestions"
          (click)="onSuggestion(s)"
          class="flex items-center gap-1 text-[11px] font-semibold px-2.5 py-1 rounded-lg
                 bg-green-50/80 border border-green-600/30 text-green-800
                 hover:bg-green-100/80 transition-colors"
        >
          {{ s }}
          <span class="flex h-4 w-4 shrink-0 items-center justify-center
                       rounded-full bg-green-600/15 text-green-700 text-[10px]">→</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Saisie -->
  <form (submit)="onSubmit($event)"
        class="flex items-center gap-2 px-3 py-2.5 shrink-0
               border-t border-green-600/15 bg-white/30">
    <input
      #chatInput
      type="text"
      [value]="draft()"
      (input)="draft.set($any($event.target).value)"
      placeholder="Écrivez votre message…"
      aria-label="Votre message"
      class="flex-1 rounded-full px-4 py-2 text-sm outline-none
             bg-white/60 border border-green-600/20 backdrop-blur-sm
             focus:ring-2 focus:ring-green-400 text-green-900 placeholder-green-700/40"
    />
    <button
      type="submit"
      aria-label="Envoyer"
      [disabled]="!draft().trim()"
      class="flex items-center justify-center w-10 h-10 rounded-full shrink-0
             bg-gradient-to-r from-emerald-500 via-green-500 to-green-600 text-white
             ring-1 ring-white/20 shadow
             hover:from-emerald-600 hover:to-green-700
             disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6" />
      </svg>
    </button>
  </form>
</div>
