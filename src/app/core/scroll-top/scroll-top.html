<button
  *ngIf="visible()"
  type="button"
  (click)="scrollToTop()"
  aria-label="Revenir en haut de la page"
  title="Revenir en haut"
  class="scroll-top-btn fixed bottom-6 right-6 z-40 flex items-center justify-center
         w-12 h-12 rounded-full bg-green-700 text-white shadow-lg
         hover:bg-green-800 focus:outline-none focus:ring-2 focus:ring-green-400
         transition-colors"
>
  <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none"
       viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
  </svg>
</button>
