<!-- Overlay de recherche -->
<div
  *ngIf="searchService.isOpen()"
  class="search-overlay fixed inset-0 z-[9998] flex items-start justify-center
         bg-black/50 backdrop-blur-sm px-4 pt-24 sm:pt-28"
  (click)="close()"
>
  <div
    class="search-panel w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden"
    (click)="$event.stopPropagation()"
  >
    <!-- Champ de recherche -->
    <div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-600 shrink-0"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z" />
      </svg>
      <input
        #searchInput
        type="text"
        [value]="query()"
        (input)="onInput($any($event.target).value)"
        (keydown)="onKeydown($event)"
        placeholder="Rechercher une page, un service…"
        aria-label="Rechercher sur le site"
        class="flex-1 bg-transparent outline-none text-gray-800 placeholder-gray-400 text-base"
      />
      <button
        (click)="close()"
        aria-label="Fermer la recherche"
        class="text-gray-400 hover:text-gray-600 text-2xl leading-none px-1"
      >
        &times;
      </button>
    </div>

    <!-- Résultats -->
    <div class="max-h-[60vh] overflow-y-auto">
      <ng-container *ngIf="results().length > 0; else noResult">
        <button
          *ngFor="let entry of results(); let i = index"
          (click)="goTo(entry)"
          (mouseenter)="activeIndex.set(i)"
          class="w-full text-left flex items-start gap-3 px-4 py-3 transition-colors"
          [class.bg-green-50]="i === activeIndex()"
        >
          <span class="mt-0.5 shrink-0 text-green-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </span>
          <span class="min-w-0">
            <span class="block font-medium text-gray-800 truncate">{{ entry.title }}</span>
            <span class="block text-sm text-gray-500 truncate">{{ entry.description }}</span>
          </span>
          <span class="ml-auto shrink-0 text-[11px] uppercase tracking-wide text-green-700/70
                       bg-green-50 rounded-full px-2 py-0.5 self-center">
            {{ entry.category }}
          </span>
        </button>
      </ng-container>

      <ng-template #noResult>
        <div class="px-4 py-10 text-center text-gray-500">
          Aucun résultat pour « <span class="font-medium text-gray-700">{{ query() }}</span> »
        </div>
      </ng-template>
    </div>

    <!-- Pied : astuces clavier -->
    <div class="hidden sm:flex items-center gap-4 px-4 py-2 border-t border-gray-100 text-xs text-gray-400">
      <span><kbd class="kbd">↑</kbd><kbd class="kbd">↓</kbd> naviguer</span>
      <span><kbd class="kbd">↵</kbd> ouvrir</span>
      <span><kbd class="kbd">Échap</kbd> fermer</span>
      <span class="ml-auto"><kbd class="kbd">Ctrl</kbd>+<kbd class="kbd">K</kbd></span>
    </div>
  </div>
</div>
