<div class="w-full max-w-4xl mx-auto px-4 sm:px-6 md:px-8 lg:px-10 xl:px-12">
  <!-- Conteneur principal centré + blanc arrondi -->
  <div class="bg-white rounded-2xl sm:rounded-3xl shadow-xl md:shadow-2xl border border-gray-100 overflow-hidden mt-3 sm:mt-4 md:mt-4 lg:mt-6 xl:mt-8">
    
    <!-- Padding intérieur global – réduit en haut -->
    <div class="pt-4 pb-6 sm:pt-5 sm:pb-8 md:pt-6 md:pb-9 lg:pt-7 lg:pb-10">
      
      <!-- INTRO centrée -->
      <div class="text-center mb-8 md:mb-10 lg:mb-12 max-w-3xl mx-auto">
        <h1 class="text-2xl sm:text-3xl md:text-4xl lg:text-4xl font-extrabold text-green-700 mb-3 md:mb-4 leading-tight">
          PNBSF
        </h1>
        <p class="text-base sm:text-lg md:text-xl text-gray-700 leading-relaxed">
          Le Programme National de Bourses de Sécurité Familiale (PNBSF) permet aux ménages les plus vulnérables de bénéficier d’une couverture maladie non contributive, financée intégralement par l’État, dans le cadre de la Couverture Sanitaire Universelle.
        </p>
      </div>

      <!-- Grille des cartes (sans icône) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 lg:gap-10 px-2 sm:px-4 lg:px-6 xl:px-8 mb-0">
        
        <div *ngFor="let item of pnbsfData"
             class="bg-white border border-gray-200 rounded-2xl shadow-lg overflow-hidden transition-all duration-300 hover:shadow-2xl hover:border-green-500/50 hover:-translate-y-2">
          
          <!-- Titre en haut de la carte -->
          <h2 class="text-xl sm:text-2xl font-bold text-green-700 mb-4 text-center px-4 pt-6">
            {{ item.title }}
          </h2>
          
          <!-- Contenu (liste) -->
          <div class="p-5 sm:p-6 md:p-7 pt-0">
            <ul class="space-y-3 text-gray-700 text-base sm:text-lg">
              <li *ngFor="let line of item.content" class="flex gap-3 items-start">
                <span class="text-green-600 text-xl flex-shrink-0 mt-0.5">✔</span>
                <span>{{ line }}</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
